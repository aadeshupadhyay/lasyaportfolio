<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Fashion Illustrations - Creative Work</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet" />
    <style>
    * {
      font-family: 'Inter', sans-serif !important;
    }
  </style>

    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: "#ffffff",
              "on-surface": "#1b1c1c",
              "body-muted": "#2c3142",
            },
            fontFamily: {
              serif: ["Inter", "sans-serif", "Georgia", "serif"],
              sans: ["Inter", "sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-background text-on-surface antialiased">
    <a
      class="fixed left-6 top-6 z-50 flex items-center justify-center w-10 h-10 bg-white/95 rounded-full border border-neutral-200/80 shadow-sm text-neutral-800 hover:text-[#0738a5] hover:bg-white hover:shadow-md transition-all duration-300 group"
      href="../creative-work.html"
      aria-label="Back to Creative Work"
    >
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 transition-transform duration-300 group-hover:-translate-x-0.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
      </svg>
    </a>

    <main class="mx-auto w-full max-w-6xl px-4 pb-20 pt-28 sm:px-6 md:px-10 md:pb-28 md:pt-36">
      <h1 class="text-center font-serif text-3xl font-medium tracking-tight text-on-surface md:text-4xl lg:text-[2.75rem] lg:leading-tight">
        Fashion Illustrations
      </h1>

      <div class="mx-auto mt-14 flex max-w-[min(100%,72rem)] flex-col gap-8 sm:gap-10">
        <figure class="min-w-0">
          <button
            type="button"
            class="lightbox-trigger group block w-full rounded-sm border-0 bg-transparent p-0 text-left ring-1 ring-neutral-200/90 outline-none transition-opacity hover:opacity-95 focus-visible:ring-2 focus-visible:ring-on-surface/35 focus-visible:ring-offset-2 focus-visible:ring-offset-background"
            data-lightbox-src="../images/Fashion%20Illustrations/Black%20swan%201.jpg"
            data-lightbox-alt="Fashion illustration presentation board — Black Swan collection 1"
            aria-haspopup="dialog"
            aria-label="Open enlarged Black Swan board 1"
          >
            <img
              class="pointer-events-none block h-auto w-full cursor-pointer object-contain bg-neutral-50"
              src="../images/Fashion%20Illustrations/Black%20swan%201.jpg"
              alt="Fashion illustration presentation board — Black Swan collection 1"
              loading="lazy"
              decoding="async"
            />
          </button>
        </figure>
        <figure class="min-w-0">
          <button
            type="button"
            class="lightbox-trigger group block w-full rounded-sm border-0 bg-transparent p-0 text-left ring-1 ring-neutral-200/90 outline-none transition-opacity hover:opacity-95 focus-visible:ring-2 focus-visible:ring-on-surface/35 focus-visible:ring-offset-2 focus-visible:ring-offset-background"
            data-lightbox-src="../images/Fashion%20Illustrations/Black%20swan%202.jpg"
            data-lightbox-alt="Fashion illustration presentation board — Black Swan collection 2"
            aria-haspopup="dialog"
            aria-label="Open enlarged Black Swan board 2"
          >
            <img
              class="pointer-events-none block h-auto w-full cursor-pointer object-contain bg-neutral-50"
              src="../images/Fashion%20Illustrations/Black%20swan%202.jpg"
              alt="Fashion illustration presentation board — Black Swan collection 2"
              loading="lazy"
              decoding="async"
            />
          </button>
        </figure>
        <figure class="min-w-0">
          <button
            type="button"
            class="lightbox-trigger group block w-full rounded-sm border-0 bg-transparent p-0 text-left ring-1 ring-neutral-200/90 outline-none transition-opacity hover:opacity-95 focus-visible:ring-2 focus-visible:ring-on-surface/35 focus-visible:ring-offset-2 focus-visible:ring-offset-background"
            data-lightbox-src="../images/Fashion%20Illustrations/Hana%201.jpg"
            data-lightbox-alt="Fashion illustration presentation board — Hana"
            aria-haspopup="dialog"
            aria-label="Open enlarged Hana board"
          >
            <img
              class="pointer-events-none block h-auto w-full cursor-pointer object-contain bg-neutral-50"
              src="../images/Fashion%20Illustrations/Hana%201.jpg"
              alt="Fashion illustration presentation board — Hana"
              loading="lazy"
              decoding="async"
            />
          </button>
        </figure>
        <figure class="min-w-0">
          <button
            type="button"
            class="lightbox-trigger group block w-full rounded-sm border-0 bg-transparent p-0 text-left ring-1 ring-neutral-200/90 outline-none transition-opacity hover:opacity-95 focus-visible:ring-2 focus-visible:ring-on-surface/35 focus-visible:ring-offset-2 focus-visible:ring-offset-background"
            data-lightbox-src="../images/Fashion%20Illustrations/Burning%20Flame.jpeg"
            data-lightbox-alt="Fashion illustration presentation board — Burning Flame"
            aria-haspopup="dialog"
            aria-label="Open enlarged Burning Flame board"
          >
            <img
              class="pointer-events-none block h-auto w-full cursor-pointer object-contain bg-neutral-50"
              src="../images/Fashion%20Illustrations/Burning%20Flame.jpeg"
              alt="Fashion illustration presentation board — Burning Flame"
              loading="lazy"
              decoding="async"
            />
          </button>
        </figure>
        <figure class="min-w-0">
          <button
            type="button"
            class="lightbox-trigger group block w-full rounded-sm border-0 bg-transparent p-0 text-left ring-1 ring-neutral-200/90 outline-none transition-opacity hover:opacity-95 focus-visible:ring-2 focus-visible:ring-on-surface/35 focus-visible:ring-offset-2 focus-visible:ring-offset-background"
            data-lightbox-src="../images/Fashion%20Illustrations/Cultural%20Fusion.jpg"
            data-lightbox-alt="Fashion illustration presentation board — Cultural Fusion"
            aria-haspopup="dialog"
            aria-label="Open enlarged Cultural Fusion board"
          >
            <img
              class="pointer-events-none block h-auto w-full cursor-pointer object-contain bg-neutral-50"
              src="../images/Fashion%20Illustrations/Cultural%20Fusion.jpg"
              alt="Fashion illustration presentation board — Cultural Fusion"
              loading="lazy"
              decoding="async"
            />
          </button>
        </figure>
      </div>
    </main>

    <!-- Lightbox Modal -->
    <div id="image-lightbox" class="fixed inset-0 z-[100] hidden bg-black/90 flex items-center justify-center backdrop-blur-sm select-none">
      <button id="lightbox-close" class="absolute right-6 top-6 text-white hover:text-neutral-300 transition-colors focus:outline-none" aria-label="Close lightbox">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
      <div class="max-w-[90vw] max-h-[90vh] flex items-center justify-center">
        <img id="image-lightbox-img" class="max-w-full max-h-[90vh] object-contain shadow-2xl" src="" alt="Enlarged view" />
      </div>
    </div>

    <script>
      (function () {
        var root = document.getElementById("image-lightbox");
        var img = document.getElementById("image-lightbox-img");
        var closeBtn = document.getElementById("lightbox-close");
        var triggers = document.querySelectorAll(".lightbox-trigger");
        var lastFocus = null;

        function open(src, alt) {
          lastFocus = document.activeElement;
          img.src = src;
          img.alt = alt || "";
          root.classList.remove("hidden");
          document.body.style.overflow = "hidden";
        }

        function close() {
          root.classList.add("hidden");
          document.body.style.overflow = "";
          img.removeAttribute("src");
          img.alt = "";
          if (lastFocus && typeof lastFocus.focus === "function") {
            lastFocus.focus();
          }
        }

        triggers.forEach(function (btn) {
          btn.addEventListener("click", function () {
            var src = btn.getAttribute("data-lightbox-src");
            var alt = btn.getAttribute("data-lightbox-alt") || "";
            if (src) open(src, alt);
          });
        });

        closeBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          close();
        });

        root.addEventListener("click", function (e) {
          if (e.target === root || e.target.id === "image-lightbox") {
            close();
          }
        });

        document.addEventListener("keydown", function (e) {
          if (root.classList.contains("hidden")) return;
          if (e.key === "Escape") close();
        });
      })();
    </script>
  </body>
</html>
